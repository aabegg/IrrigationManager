start_manual:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: irrigation_manager
    zone_subentry_id:
      required: true
      selector:
        text:
    duration:
      required: true
      selector:
        number:
          min: 0.001
          max: 14400
          step: 1
          unit_of_measurement: s
          mode: box
stop:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: irrigation_manager
assign_water:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: irrigation_manager
    zone_subentry_id:
      required: true
      selector:
        text:
    amount:
      required: true
      selector:
        number:
          min: 0.001
          max: 1000000
          step: 0.001
          unit_of_measurement: L
          mode: box

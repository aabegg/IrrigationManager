start_manual:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: irrigation_manager
    zone_subentry_id:
      required: true
      selector:
        text:
    duration:
      required: false
      selector:
        number:
          min: 0.001
          max: 14400
          step: 1
          unit_of_measurement: s
          mode: box
    amount:
      required: false
      selector:
        number:
          min: 0.001
          max: 1000000
          step: 0.001
          unit_of_measurement: L
          mode: box
    hard_time_limit:
      required: false
      selector:
        number:
          min: 0.001
          max: 14400
          step: 1
          unit_of_measurement: s
          mode: box
    expiry:
      required: false
      default: 3600
      selector:
        number:
          min: 0.001
          max: 604800
          step: 1
          unit_of_measurement: s
          mode: box

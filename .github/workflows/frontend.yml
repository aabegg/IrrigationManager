name: Frontend

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: custom_components/irrigation_manager/frontend

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: custom_components/irrigation_manager/frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
